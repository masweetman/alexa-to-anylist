<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Alexa → AnyList</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">

      <div class="px-6 py-5 border-b border-gray-100">
        <h1 class="text-lg font-bold text-gray-800">Alexa → AnyList</h1>
        <p class="text-sm text-gray-500 mt-0.5">Enter the site password to continue.</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="px-6 pt-4 space-y-2">
            {% for category, message in messages %}
              <div class="rounded-md px-4 py-3 text-sm font-medium
                {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200
                {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="post" action="/login" class="px-6 py-5 space-y-4">
        <input type="hidden" name="next" value="{{ next_url }}">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="password">
            Password
          </label>
          <input id="password" name="password" type="password" autofocus
                 placeholder="••••••••"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm
                       px-4 py-2 rounded-lg shadow-sm transition-colors">
          Log in
        </button>
      </form>

      <div class="px-6 pb-5 text-center">
        <a href="/forgot-password"
           class="text-sm text-gray-400 hover:text-gray-600">
          Forgot password?
        </a>
      </div>

    </div>
  </div>

</body>
</html>
