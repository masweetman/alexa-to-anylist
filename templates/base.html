<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Alexa → AnyList{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-lg font-bold text-gray-800 tracking-tight">Alexa → AnyList</a>
      <div class="flex gap-5 text-sm font-medium">
        <a href="/"
           class="{% if request.path == '/' %}text-blue-600{% else %}text-gray-500 hover:text-gray-800{% endif %}">
          Dashboard
        </a>
        <a href="/settings"
           class="{% if request.path == '/settings' %}text-blue-600{% else %}text-gray-500 hover:text-gray-800{% endif %}">
          Settings
        </a>
      </div>
    </div>
  </nav>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="max-w-3xl mx-auto px-4 pt-4 space-y-2">
        {% for category, message in messages %}
          <div class="rounded-md px-4 py-3 text-sm font-medium
            {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200
            {% elif category == 'success' %}bg-green-50 text-green-700 border border-green-200
            {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <!-- Main content -->
  <main class="max-w-3xl mx-auto px-4 py-6 space-y-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
