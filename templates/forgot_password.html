<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset credentials — Alexa → AnyList</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">

      <div class="px-6 py-5 border-b border-gray-100">
        <h1 class="text-lg font-bold text-gray-800">Reset credentials</h1>
        <p class="text-sm text-gray-500 mt-0.5">This will clear your password and all saved credentials.</p>
      </div>

      <div class="px-6 py-5 space-y-4">
        <div class="rounded-md px-4 py-3 text-sm bg-yellow-50 text-yellow-800 border border-yellow-200">
          <strong>Warning:</strong> The following will be deleted:
          <ul class="mt-1 list-disc list-inside space-y-0.5">
            <li>Site password</li>
            <li>AnyList email and password</li>
            <li>Amazon cookies</li>
          </ul>
          You will need to re-enter your settings after resetting.
        </div>

        <form method="post" action="/forgot-password" class="space-y-3">
          <button type="submit"
                  class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold text-sm
                         px-4 py-2 rounded-lg shadow-sm transition-colors">
            Reset everything
          </button>
        </form>

        <a href="/login"
           class="block text-center text-sm text-gray-500 hover:text-gray-700">
          Cancel — go back to login
        </a>
      </div>

    </div>
  </div>

</body>
</html>
